name: 🐛 Bug Report
description: Reportar un bug
labels: [bug, status:needs-review]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checks
      options:
        - label: He buscado en issues existentes y no es un duplicado
          required: true
        - label: Entiendo que este issue necesita `status:approved` antes de abrir un PR
          required: true

  - type: textarea
    id: description
    attributes:
      label: 🐛 Descripcion del Bug
      description: Describe claramente el bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 Pasos para Reproducir
      description: Pasos numerados para reproducir el bug
      value: |
        1. Ir a '...'
        2. Click en '...'
        3. Error: '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Comportamiento Esperado
      description: Que deberia pasar
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Comportamiento Actual
      description: Que pasa ahora (incluye errores/logs)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 🖥️ Sistema Operativo
      options:
        - macOS
        - Linux
        - Windows
        - WSL
    validations:
      required: true

  - type: dropdown
    id: shell
    attributes:
      label: 🐚 Shell
      options:
        - bash
        - zsh
        - fish
        - PowerShell
        - cmd
        - Otro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📝 Logs Relevantes
      description: Pega logs de error aqui
      render: shell

  - type: textarea
    id: context
    attributes:
      label: 💡 Contexto Adicional
      description: Screenshots, workarounds, informacion extra
